<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.shouyezailashi.com</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4edd8;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #8B4513;
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        p {
            color: #555;
            font-size: 1.3rem;
            line-height: 1.6;
        }
        .poop {
            position: absolute;
            font-size: 40px;
            animation: fall linear infinite;
            cursor: pointer;
            user-select: none;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💩 首业在拉屎 💩</h1>
        <p>诚如域名所言，首业由于特殊原因...</p>
        <p><strong>正在努力排毒清理中！</strong></p>
        <p style="font-size: 0.9rem; color: #999; margin-top: 20px;">（温馨提示：请首业冲水完毕后再试）</p>
    </div>

    <script>
        // 自动生成满屏掉落的 💩
        function createPoop() {
            const poop = document.createElement('div');
            poop.innerText = '💩';
            poop.classList.add('poop');
            poop.style.left = Math.random() * 100 + 'vw';
            poop.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5秒随机掉落速度
            poop.style.fontSize = Math.random() * 35 + 20 + 'px';
            document.body.appendChild(poop);

            // 掉落到屏幕外后自动移除，防止卡顿
            setTimeout(() => {
                poop.remove();
            }, 5000);
        }
        // 每隔300毫秒拉一个
        setInterval(createPoop, 300);
    </script>
</body>
</html>
